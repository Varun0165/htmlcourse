<!DOCTYPE html>
<html>
    <head>
        <title>position html</title>
    </head>
    <body style="height: 4000px;
    padding-top: 60px;
    padding-left:80px;">
        <div style="
            background-color:black ;
            color: aliceblue;
            position: fixed;
            top:0;
            left: 0;
            right:0;
            height: 50px;
            ">header</div>

            <div style="
            background-color: green;
            color: white;
            position: fixed;
            top: 50px;
            bottom: 0;
            left: 0;
           width: 72px;
            ">
                sidebar
                 <div style="
            position: absolute;
            background-color: red;
            color: white;
            right: 0px;
            top: 0px;
            ">
               X
            </div>
            </div>
            
            <div style="
            position: absolute;
            background-color: red;
            color: white;
            right: 10px;
            top: 60px;
            ">
                absolute
            </div>

        <div style="
            background-color: lightblue;
            width: 200px;
            height: 200px;
            position: static;
           ">div1</div>

        <div style="
            background-color: lightpink;
            width: 200px;
            height: 200px;
            position: relative;
            ">div2
             <div style="
            position: absolute;
            background-color: black;
            color: white;
            right: 10px;
            bottom: 10px;
            ">
                4:00
            </div>
        </div>

            
    </body>
</html>
