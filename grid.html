<!DOCTYPE html>
<html>
    <head>
        <title>Grid Practice</title>
    </head>

    <body>
        <div style="
            display: grid;
            grid-template-columns: 100px 100px;
            ">
            <div style="background-color:lightblue;">div 1 hello hi good morning</div>
            <div style="background-color:lightpink;">div 2</div>
        </div>

        <div style="
            margin-top: 5px;
            display: grid;
            grid-template-columns: 100px 100px 150px;
            ">
           <div style="background-color:lightblue;">div 1 hello hi good morning</div>
            <div style="background-color:lightpink;">div 2</div>
            <div style="background-color:lightgoldenrodyellow ;">div 3 here</div>
        </div>

          <div style="
            margin-top: 5px;
            display: grid;
            grid-template-columns: 100px 1fr 2fr;
            ">
           <div style="background-color:lightblue;">100px </div>
            <div style="background-color:lightpink;">1fr</div>
            <div style="background-color:lightgoldenrodyellow ;">2fr</div>
        </div>

         <div style="
            margin-top: 5px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            column-gap: 20px;
            row-gap: 20px;
            ">
           <div style="background-color:lightblue;height: 150px;">div1</div>
            <div style="background-color:lightpink;height: 150px;">div2</div>
            <div style="background-color:lightblue;height: 150px;">div3</div>
            <div style="background-color:lightpink;height: 150px;">div4</div>
            <div style="background-color:lightblue;height: 150px;">div5</div>
            <div style="background-color:lightpink;height: 150px;">div6</div>
        </div>
    </body>
</html>
