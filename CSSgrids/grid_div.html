<!DOCTYPE html>
<html>
    <head>
        <title>facebook</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">


        <style>
            .cat{
                display: inline-block;
                width: 200px;
              padding: 10px;
              border-radius: 8px;
              box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            }

            .cat img{
                width: 200px;
                height:180px;
                object-fit: cover;
            }

            .mutual-dog img{
                width:50px;
                height: 50px;
                border-radius: 50%;
                
            }

           .dog-mutual-row{
            display: grid;
            grid-template-columns: 50px 1fr;
            align-items: center;
            column-gap: 10px;
            margin-bottom: 15px;
           }

           .mutual-text{
            font-family: Roboto,Arial;
            color: gray;
           }

           .button-class{
            color: white;
            background-color: rgba(64, 64, 211, 0.918);
            width: 120px;
            height: 45px;
            border-width: 0px;
            border-radius: 5px;
            opacity: 500;
            cursor: pointer;
           }

           .button-class:hover{
            width: 122px;
            height: 46px;
            background-color: rgb(76, 0, 255);

           }
           
        </style>

    </head>

    <body>
        <div class="grid-head">
        <div class="cat">
           <div>
            <img src="cat.jpg">
           </div> 

           <div class="fb-info">
            <div style="
                font-weight: bolder;
                font-family: Roboto,Arial;
                ">
             <p>Oliver</p>
             </div>
             <div class="dog-mutual-row">
                <div class="mutual-dog"><img src="dog2.jpg"></div>
                <div class="mutual-text"><p>2 mutual friends</p></div>
             </div>
           <button class="button-class">Add Friend</button>
           </div>
           
           </div>


           <div class="cat">
           <div>
            <img src="cat2.jpg">
           </div> 

           <div class="fb-info">
            <div style="
                font-weight: bolder;
                font-family: Roboto,Arial;
                ">
             <p>Mimi</p>
             </div>
             <div class="dog-mutual-row">
                <div class="mutual-dog"><img src="dog2.jpg"></div>
                <div class="mutual-text"><p>3 mutual friends</p></div>
             </div>
           <button class="button-class">Add Friend</button>
           </div>
           
           </div>

           
           <div class="cat">
           <div>
            <img src="dog.jpg">
           </div> 

           <div class="fb-info">
            <div style="
                font-weight: bolder;
                font-family: Roboto,Arial;
                ">
             <p>Rex</p>
             </div>
             <div class="dog-mutual-row">
                <div class="mutual-dog"><img src="dog2.jpg"></div>
                <div class="mutual-text"><p>4 mutual friends</p></div>
             </div>
           <button class="button-class">Add Friend</button>
           </div>
           
           </div>
        </div>

    </body>
</html>
